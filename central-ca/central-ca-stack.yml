AWSTemplateFormatVersion: '2010-09-09'
Description: 'Central KMS-backed Certificate Authority for IAM Roles Anywhere — the ONLY template you deploy for this path. One flat stack: fetches handler.py + kms_ca.py from GitHub and zips them in-memory (no zip file in the repo, no manual S3 upload), creates the KMS CA key, the issuer Lambda, auto-bootstraps the Root CA cert, and registers it as a Roles Anywhere Trust Anchor. Every Role/Profile is created separately via the manual IAM console runbook in README.md (deliberately not in this template — avoids drift). See ../local-ca-stack.yml for the separate laptop-local OpenSSL CA path.'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: 'AWS Resource Naming'
        Parameters:
          - ProjectName
          - BucketPrefix
      - Label:
          default: 'Root CA Certificate Identity (X.509 subject fields)'
        Parameters:
          - CACommonName
          - CAOrg
          - CACountry
          - CACertValidityDays
      - Label:
          default: 'Public Endpoint (API Gateway — lets devs request certs with NO AWS credentials)'
        Parameters:
          - ApiKeyValue
      - Label:
          default: 'Operations'
        Parameters:
          - LogRetentionDays
      - Label:
          default: 'Deployment Source (GitHub) — only change if you forked the repo or moved branches'
        Parameters:
          - HandlerSourceUrl
          - KmsCaSourceUrl
          - CodeVersion
    ParameterLabels:
      ProjectName:
        default: 'Project Name'
      BucketPrefix:
        default: 'S3 Bucket Prefix'
      CACommonName:
        default: 'CA Common Name (CN)'
      CAOrg:
        default: 'CA Organization (O)'
      CACountry:
        default: 'CA Country Code (C)'
      CACertValidityDays:
        default: 'Root CA Certificate Validity (days)'
      ApiKeyValue:
        default: 'API Gateway API Key Value'
      LogRetentionDays:
        default: 'CloudWatch Log Retention (days)'
      HandlerSourceUrl:
        default: 'handler.py Source URL'
      KmsCaSourceUrl:
        default: 'kms_ca.py Source URL'
      CodeVersion:
        default: 'Code Version Tag'

Parameters:
  ProjectName:
    Type: String
    Default: 'CentralCA'
    AllowedPattern: '^[A-Za-z][A-Za-z0-9-]{1,30}$'
    Description: 'Prefix used to name every resource this stack creates (KMS alias, Lambda functions, DynamoDB table, IAM roles, Trust Anchor, Profile). Letters, numbers, hyphens only, must start with a letter. Example: "CentralCA" produces "CentralCA-issuer", "CentralCA-TrustAnchor", etc.'

  BucketPrefix:
    Type: String
    Default: 'centralca-artifacts'
    AllowedPattern: '^[a-z0-9][a-z0-9.-]{1,40}$'
    Description: 'Prefix for the S3 bucket that holds the fetched Lambda code, ca-certificate.pem, and crl.pem. Must be lowercase (S3 bucket-name rule). The full bucket name becomes "<this>-<AccountId>-<Region>", so it stays globally unique — you normally never need to change this default.'

  CACommonName:
    Type: String
    Default: 'Central-RootCA'
    MinLength: 1
    Description: 'The Common Name (CN) of the Root CA certificate — the main identifying name AWS and openssl show for this CA, e.g. in "Issuer: CN=Central-RootCA". Pick something that identifies this CA within your organization, e.g. "Acme-RootCA" or "Cosmos-Central-RootCA". No spaces recommended.'

  CAOrg:
    Type: String
    Default: 'MyOrg'
    MinLength: 1
    Description: 'The Organization (O) field of the Root CA certificate subject — typically your company or team name, e.g. "Acme Inc" or "Playto". Shown alongside the Common Name in every certificate this CA issues (both the CA cert itself and every client cert signed by it).'

  CACountry:
    Type: String
    Default: 'US'
    AllowedPattern: '^[A-Z]{2}$'
    ConstraintDescription: 'Must be exactly 2 uppercase letters (ISO 3166-1 alpha-2), e.g. US, IN, GB, DE.'
    Description: 'The Country (C) field of the Root CA certificate subject — a 2-letter ISO country code, e.g. "US", "IN", "GB". This is a strict X.509 convention: exactly 2 uppercase letters, nothing else.'

  CACertValidityDays:
    Type: Number
    Default: 3650
    MinValue: 1
    MaxValue: 3650
    Description: 'How many days the Root CA certificate itself is valid for. Default 3650 = 10 years (the maximum this stack allows, and a sane default for a CA that many client certificates will chain to over time). Only used the FIRST time this stack bootstraps the CA — changing it later has no effect on an already-created CA cert; you would need a new CA entirely to change this. Individual client certificates have their own, separately configurable validity (the "days" field on each sign/renew request), unrelated to this value.'

  LogRetentionDays:
    Type: Number
    Default: 30
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1096, 1827, 3653]
    Description: 'How many days to keep CloudWatch Logs for both Lambda functions (issuer + fetcher). Without this, Lambda logs are kept forever by default and cost grows unbounded. Default 30 days.'

  ApiKeyValue:
    Type: String
    NoEcho: true
    MinLength: 20
    MaxLength: 128
    AllowedPattern: '^[A-Za-z0-9._-]{20,128}$'
    ConstraintDescription: 'API Gateway API keys must be 20-128 chars: letters, digits, and . _ - only (no spaces).'
    Description: 'The API Gateway API-key value YOU choose (treat it like a password — generate one with e.g. `openssl rand -hex 20`). A dev sends it in the "x-api-key" header to request/revoke certificates over the public API endpoint, with NO AWS IAM credentials. Anyone who has this key can request a certificate, so share it only with people you are onboarding, and rotate it (update this stack with a new value) if it ever leaks. 20-128 chars, no default — you must set this explicitly.'

  HandlerSourceUrl:
    Type: String
    Default: 'https://raw.githubusercontent.com/vireshsolanki/iam-roles-anywhere-automation/main/central-ca/lambda/handler.py'
    Description: 'Raw GitHub URL to handler.py — fetched and zipped in-memory at deploy time, no zip file lives in the repo. Only change this if you forked the repo or use a different branch.'

  KmsCaSourceUrl:
    Type: String
    Default: 'https://raw.githubusercontent.com/vireshsolanki/iam-roles-anywhere-automation/main/central-ca/lambda/kms_ca.py'
    Description: 'Raw GitHub URL to kms_ca.py. Only change this if you forked the repo or use a different branch.'

  CodeVersion:
    Type: String
    Default: 'v1'
    Description: 'Version tag embedded in the S3 object key for the fetched Lambda code (lambda-code-<this>.zip). Bump this (v2, v3, ...) after pushing new code to GitHub and updating this stack, to force a re-fetch and Lambda update — CloudFormation only re-fetches when this value changes.'

Resources:
  # ── Staging bucket: also holds the fetched Lambda zip and (later) ca-certificate.pem / crl.pem ──
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${BucketPrefix}-${AWS::AccountId}-${AWS::Region}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ── Fetcher: downloads handler.py + kms_ca.py from GitHub and zips them
  # in-memory into S3. Tiny (<4096 chars), so it's inlined directly — this is
  # why the real CA logic (~16KB combined) can't be inlined the same way.
  FetcherRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-fetcher-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: put-code
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub '${ArtifactBucket.Arn}/*'
              # Idempotent log-retention mode (below) creates-or-reuses the
              # log group rather than requiring exclusive ownership — see
              # CALambdaLogRetention / FetcherLogRetention custom resources.
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:PutRetentionPolicy
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-issuer:*'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-fetcher:*'

  FetcherFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-fetcher'
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      Role: !GetAtt FetcherRole.Arn
      Code:
        ZipFile: |
          import json, urllib.request, boto3, zipfile, io
          s3 = boto3.client('s3')
          logs = boto3.client('logs')

          def handler(event, context):
              rt = event['RequestType']
              props = event.get('ResourceProperties', {})
              pid = event.get('PhysicalResourceId') or 'code-fetch'
              try:
                  if rt in ('Create', 'Update'):
                      if props.get('Mode') == 'log-retention':
                          log_name = props['LogGroupName']
                          try:
                              logs.create_log_group(logGroupName=log_name)
                          except logs.exceptions.ResourceAlreadyExistsException:
                              pass
                          logs.put_retention_policy(logGroupName=log_name, retentionInDays=int(props['RetentionDays']))
                      else:
                          buf = io.BytesIO()
                          with zipfile.ZipFile(buf, 'w', zipfile.ZIP_DEFLATED) as zf:
                              for name, url in props['Files'].items():
                                  zf.writestr(name, urllib.request.urlopen(url).read())
                          s3.put_object(Bucket=props['Bucket'], Key=props['Key'], Body=buf.getvalue())
                  _send(event, context, 'SUCCESS', pid)
              except Exception as exc:
                  _send(event, context, 'FAILED', pid, str(exc))

          def _send(event, context, status, pid, reason=None):
              body = json.dumps({
                  'Status': status,
                  'Reason': reason or f'See CloudWatch Log Stream: {context.log_stream_name}',
                  'PhysicalResourceId': pid,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': {},
              }).encode()
              req = urllib.request.Request(event['ResponseURL'], data=body, method='PUT', headers={'Content-Type': ''})
              urllib.request.urlopen(req)

  FetchZip:
    Type: Custom::FetchZip
    Properties:
      ServiceToken: !GetAtt FetcherFunction.Arn
      Files:
        handler.py: !Ref HandlerSourceUrl
        kms_ca.py: !Ref KmsCaSourceUrl
      Bucket: !Ref ArtifactBucket
      Key: !Sub 'lambda-code-${CodeVersion}.zip'

  # ── The CA private key: lives in KMS, cannot be exported ────────────────────
  CAKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub '${ProjectName} Root CA signing key (asymmetric, sign/verify)'
      KeySpec: RSA_2048
      KeyUsage: SIGN_VERIFY
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: AdminRoot
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'

  CAKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${ProjectName}-ca'
      TargetKeyId: !Ref CAKey

  # ── Index of every issued certificate (needed for revocation / CRL) ─────────
  CertTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${ProjectName}-certificates'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: serial
          AttributeType: S
      KeySchema:
        - AttributeName: serial
          KeyType: HASH

  # ── Lambda: the issuing authority (invoked directly, IAM-authorized) ────────
  CALambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ca-permissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: SignWithCAKey
                Effect: Allow
                Action:
                  - kms:Sign
                  - kms:GetPublicKey
                Resource: !GetAtt CAKey.Arn
              - Sid: CertIndex
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Scan
                Resource: !GetAtt CertTable.Arn
              - Sid: Artifacts
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub '${ArtifactBucket.Arn}/*'

  CALambda:
    Type: AWS::Lambda::Function
    DependsOn: FetchZip
    Properties:
      FunctionName: !Sub '${ProjectName}-issuer'
      Runtime: python3.12
      Handler: handler.handler
      Timeout: 30
      MemorySize: 256
      Role: !GetAtt CALambdaRole.Arn
      # Pure standard-library Python (handler.py + kms_ca.py, ~16KB — too big to
      # inline). FetchZip above already built it in ArtifactBucket.
      Code:
        S3Bucket: !Ref ArtifactBucket
        S3Key: !Sub 'lambda-code-${CodeVersion}.zip'
      Environment:
        Variables:
          CA_KEY_ID: !Ref CAKey
          TABLE_NAME: !Ref CertTable
          BUCKET_NAME: !Ref ArtifactBucket
          CA_CN: !Ref CACommonName
          CA_ORG: !Ref CAOrg
          CA_COUNTRY: !Ref CACountry

  # ── Log retention, applied idempotently (create-or-reuse + set retention) ───
  # NOT AWS::Logs::LogGroup: that resource type fails hard with "already
  # exists" if the log group was already lazily auto-created by a prior
  # Lambda invocation (which happens during THIS SAME deploy, since
  # CABootstrap/FetchZip invoke these functions) or by any earlier deploy of
  # this stack. This mode of FetcherFunction instead creates the group only
  # if missing, then unconditionally sets retention — safe to run repeatedly,
  # self-heals a log group that already exists with no retention set.
  FetcherLogRetention:
    Type: Custom::LogRetention
    Properties:
      ServiceToken: !GetAtt FetcherFunction.Arn
      Mode: log-retention
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-fetcher'
      RetentionDays: !Ref LogRetentionDays

  CALambdaLogRetention:
    Type: Custom::LogRetention
    Properties:
      ServiceToken: !GetAtt FetcherFunction.Arn
      Mode: log-retention
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-issuer'
      RetentionDays: !Ref LogRetentionDays

  # ── Public HTTPS endpoint: API Gateway REST API, API-key auth ───────────────
  # A dev with NO AWS credentials calls POST <ApiEndpoint> with header
  # "x-api-key: <ApiKeyValue>". API Gateway validates the key itself and only
  # then proxies to the Lambda — so there's no secret-check in the Lambda code,
  # and the Lambda can't be invoked directly by the public (only API Gateway,
  # per CApiLambdaPermission, and the admin via IAM). Chosen over a Lambda
  # Function URL because org guardrails often block public Function URLs but
  # allow public API Gateway REST APIs.
  CApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${ProjectName}-api'
      Description: 'Central CA public endpoint (sign/revoke, API-key gated)'
      EndpointConfiguration:
        Types: [REGIONAL]

  CApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CApi
      ParentId: !GetAtt CApi.RootResourceId
      PathPart: issue

  CApiMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CApi
      ResourceId: !Ref CApiResource
      HttpMethod: POST
      AuthorizationType: NONE      # no IAM/Cognito; the API key below is the gate
      ApiKeyRequired: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST   # Lambda proxy integrations are always POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CALambda.Arn}/invocations'

  CApiLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CALambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${CApi}/*/POST/issue'

  # NOTE: AWS::ApiGateway::Deployment does not auto-redeploy when the API's
  # methods change on a stack UPDATE. If you later change CApiMethod/CApiResource,
  # rename this resource (e.g. CApiDeployment2) to force a fresh deployment.
  CApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: CApiMethod
    Properties:
      RestApiId: !Ref CApi

  CApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref CApi
      DeploymentId: !Ref CApiDeployment
      StageName: prod

  CApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: !Sub '${ProjectName}-api-key'
      Enabled: true
      Value: !Ref ApiKeyValue   # you choose the value, so you already know it

  CApiUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: CApiStage
    Properties:
      UsagePlanName: !Sub '${ProjectName}-usage-plan'
      ApiStages:
        - ApiId: !Ref CApi
          Stage: prod

  CApiUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref CApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref CApiUsagePlan

  # ── Auto-bootstrap: creates the self-signed Root CA cert on stack deploy ────
  # No manual "run a test event" step. Idempotent on stack updates (reuses the
  # existing CA if already created); never deletes CA material on stack deletion.
  CABootstrap:
    Type: Custom::CABootstrap
    Properties:
      ServiceToken: !GetAtt CALambda.Arn
      Days: !Ref CACertValidityDays

  # ── Trust Anchor, wired straight to the auto-bootstrapped cert ──────────────
  # No manual copy-paste of the CA cert anywhere. Deliberately NO Role/Profile
  # here — every Role/Profile (including your very first one) is created
  # manually via the IAM/Roles Anywhere console (see README.md, "Giving a
  # different user a different policy"). Keeping them out of CloudFormation
  # means there's nothing here for a hand-edit (e.g. adding a role to a
  # Profile via console) to drift against.
  TrustAnchor:
    Type: AWS::RolesAnywhere::TrustAnchor
    Properties:
      Name: !Sub '${ProjectName}-TrustAnchor'
      Enabled: true
      Source:
        SourceType: CERTIFICATE_BUNDLE
        SourceData:
          X509CertificateData: !GetAtt CABootstrap.CACertificate
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-TrustAnchor'
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  LambdaName:
    Description: 'Issuer Lambda name — for admin direct invoke (sign/revoke/crl/bootstrap)'
    Value: !Ref CALambda

  ApiEndpoint:
    Description: 'Public HTTPS endpoint for sign/revoke — give this + the ApiKeyValue you set to devs (no AWS credentials needed on their end). POST JSON with header x-api-key: <ApiKeyValue>'
    Value: !Sub 'https://${CApi}.execute-api.${AWS::Region}.amazonaws.com/prod/issue'

  CACertificatePem:
    Description: 'Root CA certificate PEM (already registered as the Trust Anchor below — no manual copy-paste needed)'
    Value: !GetAtt CABootstrap.CACertificate

  CAKeyId:
    Description: 'KMS CA key id'
    Value: !Ref CAKey

  ArtifactBucketName:
    Description: 'S3 bucket holding ca-certificate.pem and crl.pem'
    Value: !Ref ArtifactBucket

  CertTableName:
    Description: 'DynamoDB certificate index'
    Value: !Ref CertTable

  TrustAnchorArn:
    Description: 'Roles Anywhere Trust Anchor ARN — created ONCE per stack, reused by every Role/Profile you create manually (see README.md)'
    Value: !GetAtt TrustAnchor.TrustAnchorArn
