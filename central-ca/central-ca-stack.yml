AWSTemplateFormatVersion: '2010-09-09'
Description: 'Central KMS-backed Certificate Authority for IAM Roles Anywhere — the ONLY template you deploy for this path. One flat stack: fetches handler.py + kms_ca.py from GitHub and zips them in-memory (no zip file in the repo, no manual S3 upload), creates the KMS CA key, the issuer Lambda, auto-bootstraps the Root CA cert, and registers it as a Roles Anywhere Trust Anchor/Profile/Role. See ../local-ca-stack.yml for the separate laptop-local OpenSSL CA path.'

Parameters:
  ProjectName:
    Type: String
    Default: 'CentralCA'
    Description: 'Name prefix for all created resources'

  BucketPrefix:
    Type: String
    Default: 'centralca-artifacts'
    AllowedPattern: '^[a-z0-9][a-z0-9.-]{1,40}$'
    Description: 'Lowercase prefix for the artifact S3 bucket (S3 names must be lowercase)'

  HandlerSourceUrl:
    Type: String
    Default: 'https://raw.githubusercontent.com/vireshsolanki/iam-roles-anywhere-automation/main/central-ca/lambda/handler.py'
    Description: 'Raw GitHub URL to handler.py — fetched and zipped in-memory at deploy time, no zip file lives in the repo'

  KmsCaSourceUrl:
    Type: String
    Default: 'https://raw.githubusercontent.com/vireshsolanki/iam-roles-anywhere-automation/main/central-ca/lambda/kms_ca.py'
    Description: 'Raw GitHub URL to kms_ca.py'

  CodeVersion:
    Type: String
    Default: 'v1'
    Description: 'Bump this (v2, v3, ...) after pushing new code to GitHub, to force a re-fetch and update'

  CACommonName:
    Type: String
    Default: 'Central-RootCA'
    Description: 'Root CA subject Common Name'

  CAOrg:
    Type: String
    Default: 'MyOrg'

  CACountry:
    Type: String
    Default: 'US'

  SessionDurationSeconds:
    Type: Number
    Default: 43200
    MinValue: 900
    MaxValue: 43200
    Description: 'Maximum Roles Anywhere session duration in seconds. Default 43200 = 12 hours (the maximum AWS allows). Other common values: 3600 = 1 hour, 900 = 15 minutes (the minimum). This bounds how long a single aws_signing_helper credential fetch can request before it must fetch again — lower it if you want callers to re-authenticate against the CA more often.'

  IAMPolicyArns:
    Type: CommaDelimitedList
    Default: 'arn:aws:iam::aws:policy/ReadOnlyAccess'
    Description: 'Comma-separated list of IAM policy ARNs to attach to the role that Roles Anywhere sessions assume'

Resources:
  # ── Staging bucket: also holds the fetched Lambda zip and (later) ca-certificate.pem / crl.pem ──
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${BucketPrefix}-${AWS::AccountId}-${AWS::Region}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ── Fetcher: downloads handler.py + kms_ca.py from GitHub and zips them
  # in-memory into S3. Tiny (<4096 chars), so it's inlined directly — this is
  # why the real CA logic (~16KB combined) can't be inlined the same way.
  FetcherRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-fetcher-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: put-code
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub '${ArtifactBucket.Arn}/*'

  FetcherFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-fetcher'
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      Role: !GetAtt FetcherRole.Arn
      Code:
        ZipFile: |
          import json, urllib.request, boto3, zipfile, io
          s3 = boto3.client('s3')

          def handler(event, context):
              rt = event['RequestType']
              props = event.get('ResourceProperties', {})
              pid = event.get('PhysicalResourceId') or 'code-fetch'
              try:
                  if rt in ('Create', 'Update'):
                      buf = io.BytesIO()
                      with zipfile.ZipFile(buf, 'w', zipfile.ZIP_DEFLATED) as zf:
                          for name, url in props['Files'].items():
                              zf.writestr(name, urllib.request.urlopen(url).read())
                      s3.put_object(Bucket=props['Bucket'], Key=props['Key'], Body=buf.getvalue())
                  _send(event, context, 'SUCCESS', pid)
              except Exception as exc:
                  _send(event, context, 'FAILED', pid, str(exc))

          def _send(event, context, status, pid, reason=None):
              body = json.dumps({
                  'Status': status,
                  'Reason': reason or f'See CloudWatch Log Stream: {context.log_stream_name}',
                  'PhysicalResourceId': pid,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': {},
              }).encode()
              req = urllib.request.Request(event['ResponseURL'], data=body, method='PUT', headers={'Content-Type': ''})
              urllib.request.urlopen(req)

  FetchZip:
    Type: Custom::FetchZip
    Properties:
      ServiceToken: !GetAtt FetcherFunction.Arn
      Files:
        handler.py: !Ref HandlerSourceUrl
        kms_ca.py: !Ref KmsCaSourceUrl
      Bucket: !Ref ArtifactBucket
      Key: !Sub 'lambda-code-${CodeVersion}.zip'

  # ── The CA private key: lives in KMS, cannot be exported ────────────────────
  CAKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub '${ProjectName} Root CA signing key (asymmetric, sign/verify)'
      KeySpec: RSA_2048
      KeyUsage: SIGN_VERIFY
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: AdminRoot
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'

  CAKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${ProjectName}-ca'
      TargetKeyId: !Ref CAKey

  # ── Index of every issued certificate (needed for revocation / CRL) ─────────
  CertTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${ProjectName}-certificates'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: serial
          AttributeType: S
      KeySchema:
        - AttributeName: serial
          KeyType: HASH

  # ── Lambda: the issuing authority (invoked directly, IAM-authorized) ────────
  CALambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ca-permissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: SignWithCAKey
                Effect: Allow
                Action:
                  - kms:Sign
                  - kms:GetPublicKey
                Resource: !GetAtt CAKey.Arn
              - Sid: CertIndex
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Scan
                Resource: !GetAtt CertTable.Arn
              - Sid: Artifacts
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub '${ArtifactBucket.Arn}/*'

  CALambda:
    Type: AWS::Lambda::Function
    DependsOn: FetchZip
    Properties:
      FunctionName: !Sub '${ProjectName}-issuer'
      Runtime: python3.12
      Handler: handler.handler
      Timeout: 30
      MemorySize: 256
      Role: !GetAtt CALambdaRole.Arn
      # Pure standard-library Python (handler.py + kms_ca.py, ~16KB — too big to
      # inline). FetchZip above already built it in ArtifactBucket.
      Code:
        S3Bucket: !Ref ArtifactBucket
        S3Key: !Sub 'lambda-code-${CodeVersion}.zip'
      Environment:
        Variables:
          CA_KEY_ID: !Ref CAKey
          TABLE_NAME: !Ref CertTable
          BUCKET_NAME: !Ref ArtifactBucket
          CA_CN: !Ref CACommonName
          CA_ORG: !Ref CAOrg
          CA_COUNTRY: !Ref CACountry

  # ── Auto-bootstrap: creates the self-signed Root CA cert on stack deploy ────
  # No manual "run a test event" step. Idempotent on stack updates (reuses the
  # existing CA if already created); never deletes CA material on stack deletion.
  CABootstrap:
    Type: Custom::CABootstrap
    Properties:
      ServiceToken: !GetAtt CALambda.Arn
      Days: 3650

  # ── Roles Anywhere trust chain, wired straight to the auto-bootstrapped cert ─
  # No manual copy-paste of the CA cert anywhere — this stack IS the complete
  # pipeline: KMS CA → issuer Lambda → Trust Anchor → Profile → Role.
  ExternalSystemRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-ExternalSystemRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: rolesanywhere.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
              - sts:SetSourceIdentity
      ManagedPolicyArns: !Ref IAMPolicyArns
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-ExternalSystemRole'
        - Key: ManagedBy
          Value: CloudFormation

  TrustAnchor:
    Type: AWS::RolesAnywhere::TrustAnchor
    Properties:
      Name: !Sub '${ProjectName}-TrustAnchor'
      Enabled: true
      Source:
        SourceType: CERTIFICATE_BUNDLE
        SourceData:
          X509CertificateData: !GetAtt CABootstrap.CACertificate
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-TrustAnchor'
        - Key: ManagedBy
          Value: CloudFormation

  Profile:
    Type: AWS::RolesAnywhere::Profile
    Properties:
      Name: !Sub '${ProjectName}-Profile'
      Enabled: true
      DurationSeconds: !Ref SessionDurationSeconds
      RoleArns:
        - !GetAtt ExternalSystemRole.Arn
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-Profile'
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  LambdaName:
    Description: 'Issuer Lambda name — invoke to sign/revoke user certificates'
    Value: !Ref CALambda

  CACertificatePem:
    Description: 'Root CA certificate PEM (already registered as the Trust Anchor below — no manual copy-paste needed)'
    Value: !GetAtt CABootstrap.CACertificate

  CAKeyId:
    Description: 'KMS CA key id'
    Value: !Ref CAKey

  ArtifactBucketName:
    Description: 'S3 bucket holding ca-certificate.pem and crl.pem'
    Value: !Ref ArtifactBucket

  CertTableName:
    Description: 'DynamoDB certificate index'
    Value: !Ref CertTable

  TrustAnchorArn:
    Description: 'Roles Anywhere Trust Anchor ARN — use when issuing/using client certificates'
    Value: !GetAtt TrustAnchor.TrustAnchorArn

  ProfileArn:
    Description: 'Roles Anywhere Profile ARN'
    Value: !GetAtt Profile.ProfileArn

  RoleArn:
    Description: 'IAM Role ARN that Roles Anywhere sessions assume'
    Value: !GetAtt ExternalSystemRole.Arn
