AWSTemplateFormatVersion: '2010-09-09'
Description: 'Central CA — orchestrator stack. This is the ONLY template you deploy by hand. It fetches handler.py + kms_ca.py from GitHub, zips them in-memory, and fetches infra-stack.yml, staging everything in S3, then creates infra-stack.yml as a nested stack. No zip file in the repo, no manual S3 upload, no manual Lambda test events.'

Parameters:
  ProjectName:
    Type: String
    Default: 'CentralCA'
    Description: 'Name prefix for all created resources'

  BucketPrefix:
    Type: String
    Default: 'centralca-artifacts'
    AllowedPattern: '^[a-z0-9][a-z0-9.-]{1,40}$'
    Description: 'Lowercase prefix for the artifact S3 bucket (S3 names must be lowercase)'

  HandlerSourceUrl:
    Type: String
    Default: 'https://raw.githubusercontent.com/vireshsolanki/iam-roles-anywhere-automation/main/central-ca/lambda/handler.py'
    Description: 'Raw GitHub URL to handler.py — fetched and zipped in-memory at deploy time, no zip file lives in the repo'

  KmsCaSourceUrl:
    Type: String
    Default: 'https://raw.githubusercontent.com/vireshsolanki/iam-roles-anywhere-automation/main/central-ca/lambda/kms_ca.py'
    Description: 'Raw GitHub URL to kms_ca.py'

  InfraTemplateUrl:
    Type: String
    Default: 'https://raw.githubusercontent.com/vireshsolanki/iam-roles-anywhere-automation/main/central-ca/infra-stack.yml'
    Description: 'Raw GitHub URL to infra-stack.yml (nested-stack templates must be read from S3, so this stack stages it there first)'

  CodeVersion:
    Type: String
    Default: 'v1'
    Description: 'Bump this (v2, v3, ...) after pushing new code/template to GitHub, to force a re-fetch and update'

  CACommonName:
    Type: String
    Default: 'Central-RootCA'
    Description: 'Root CA subject Common Name'

  CAOrg:
    Type: String
    Default: 'MyOrg'

  CACountry:
    Type: String
    Default: 'US'

  SessionDurationSeconds:
    Type: Number
    Default: 3600
    MinValue: 900
    MaxValue: 43200
    Description: 'Maximum Roles Anywhere session duration in seconds (15 min to 12 hours)'

  IAMPolicyArns:
    Type: CommaDelimitedList
    Default: 'arn:aws:iam::aws:policy/ReadOnlyAccess'
    Description: 'Comma-separated list of IAM policy ARNs to attach to the role that Roles Anywhere sessions assume'

Resources:
  # ── Staging bucket: holds the fetched lambda.zip and infra-stack.yml ────────
  CodeBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${BucketPrefix}-code-${AWS::AccountId}-${AWS::Region}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ── Generic fetcher: downloads file(s) into S3. Tiny (<4096 chars), so it
  # can be inlined directly. Two modes:
  #   Mode=zip  : download multiple source files and zip them in-memory
  #               (used for the Lambda's .py source — no .zip file lives in
  #               the repo, only plain source)
  #   (default) : copy a single URL's bytes straight through (used for the
  #               nested stack's template body — TemplateURL must point to
  #               S3, not a plain GitHub URL, so the template is staged too)
  FetcherRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-fetcher-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: put-code
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub '${CodeBucket.Arn}/*'

  FetcherFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-fetcher'
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      Role: !GetAtt FetcherRole.Arn
      Code:
        ZipFile: |
          import json, urllib.request, boto3, zipfile, io
          s3 = boto3.client('s3')

          def handler(event, context):
              rt = event['RequestType']
              props = event.get('ResourceProperties', {})
              pid = event.get('PhysicalResourceId') or 'code-fetch'
              try:
                  if rt in ('Create', 'Update'):
                      if props.get('Mode') == 'zip':
                          buf = io.BytesIO()
                          with zipfile.ZipFile(buf, 'w', zipfile.ZIP_DEFLATED) as zf:
                              for name, url in props['Files'].items():
                                  zf.writestr(name, urllib.request.urlopen(url).read())
                          data = buf.getvalue()
                      else:
                          data = urllib.request.urlopen(props['SourceUrl']).read()
                      s3.put_object(Bucket=props['Bucket'], Key=props['Key'], Body=data)
                  _send(event, context, 'SUCCESS', pid)
              except Exception as exc:
                  _send(event, context, 'FAILED', pid, str(exc))

          def _send(event, context, status, pid, reason=None):
              body = json.dumps({
                  'Status': status,
                  'Reason': reason or f'See CloudWatch Log Stream: {context.log_stream_name}',
                  'PhysicalResourceId': pid,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': {},
              }).encode()
              req = urllib.request.Request(event['ResponseURL'], data=body, method='PUT', headers={'Content-Type': ''})
              urllib.request.urlopen(req)

  FetchZip:
    Type: Custom::FetchZip
    Properties:
      ServiceToken: !GetAtt FetcherFunction.Arn
      Mode: zip
      Files:
        handler.py: !Ref HandlerSourceUrl
        kms_ca.py: !Ref KmsCaSourceUrl
      Bucket: !Ref CodeBucket
      Key: !Sub 'lambda-code-${CodeVersion}.zip'

  FetchInfraTemplate:
    Type: Custom::FetchInfraTemplate
    Properties:
      ServiceToken: !GetAtt FetcherFunction.Arn
      SourceUrl: !Ref InfraTemplateUrl
      Bucket: !Ref CodeBucket
      Key: !Sub 'infra-template-${CodeVersion}.yml'

  # ── The actual CA infra, created automatically as a nested stack ────────────
  InfraStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - FetchZip
      - FetchInfraTemplate
    Properties:
      TemplateURL: !Sub 'https://${CodeBucket}.s3.${AWS::Region}.amazonaws.com/infra-template-${CodeVersion}.yml'
      Parameters:
        ProjectName: !Ref ProjectName
        BucketPrefix: !Ref BucketPrefix
        CodeBucketName: !Ref CodeBucket
        CodeObjectKey: !Sub 'lambda-code-${CodeVersion}.zip'
        CACommonName: !Ref CACommonName
        CAOrg: !Ref CAOrg
        CACountry: !Ref CACountry
        SessionDurationSeconds: !Ref SessionDurationSeconds
        IAMPolicyArns: !Join [',', !Ref IAMPolicyArns]

Outputs:
  LambdaName:
    Description: 'Issuer Lambda name — invoke to sign/revoke user certificates'
    Value: !GetAtt InfraStack.Outputs.LambdaName

  CACertificatePem:
    Description: 'Root CA certificate PEM (also already registered as the Trust Anchor below — no manual copy-paste needed)'
    Value: !GetAtt InfraStack.Outputs.CACertificatePem

  CAKeyId:
    Description: 'KMS CA key id'
    Value: !GetAtt InfraStack.Outputs.CAKeyId

  ArtifactBucketName:
    Description: 'S3 bucket holding ca-certificate.pem and crl.pem'
    Value: !GetAtt InfraStack.Outputs.ArtifactBucketName

  CertTableName:
    Description: 'DynamoDB certificate index'
    Value: !GetAtt InfraStack.Outputs.CertTableName

  TrustAnchorArn:
    Description: 'Roles Anywhere Trust Anchor ARN — use when issuing/using client certificates'
    Value: !GetAtt InfraStack.Outputs.TrustAnchorArn

  ProfileArn:
    Description: 'Roles Anywhere Profile ARN'
    Value: !GetAtt InfraStack.Outputs.ProfileArn

  RoleArn:
    Description: 'IAM Role ARN that Roles Anywhere sessions assume'
    Value: !GetAtt InfraStack.Outputs.RoleArn
