AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS IAM Roles Anywhere — Trust Anchor/Profile/Role for the LAPTOP-LOCAL OpenSSL CA path (CA private key managed by ./setup-ca.sh, not AWS KMS). For the KMS-backed central CA instead, see central-ca/central-ca-stack.yml.'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: 'AWS Resource Naming'
        Parameters:
          - ProjectName
      - Label:
          default: 'Certificate Authority'
        Parameters:
          - CACertificateBody
      - Label:
          default: 'Roles Anywhere Access'
        Parameters:
          - SessionDurationSeconds
          - IAMPolicyArns
    ParameterLabels:
      ProjectName:
        default: 'Project Name'
      CACertificateBody:
        default: 'Root CA Certificate (PEM)'
      SessionDurationSeconds:
        default: 'Max Session Duration (seconds)'
      IAMPolicyArns:
        default: 'IAM Policy ARNs to Attach'

Parameters:
  ProjectName:
    Type: String
    Default: 'MyRolesAnywhere'
    AllowedPattern: '^[A-Za-z][A-Za-z0-9-]{1,30}$'
    Description: 'Prefix used to name every resource this stack creates (IAM role, Trust Anchor, Profile). Letters, numbers, hyphens only, must start with a letter. Example: "MyRolesAnywhere" produces "MyRolesAnywhere-ExternalSystemRole", "MyRolesAnywhere-TrustAnchor", etc.'

  CACertificateBody:
    Type: String
    Description: 'The full contents of ./ca/ca-certificate.pem, generated by running ./setup-ca.sh first. Paste the whole PEM block including the -----BEGIN CERTIFICATE----- / -----END CERTIFICATE----- lines. This is the certificate AWS will trust as the Roles Anywhere Trust Anchor.'

  SessionDurationSeconds:
    Type: Number
    Default: 43200
    MinValue: 900
    MaxValue: 43200
    Description: 'Maximum Roles Anywhere session duration in seconds. Default 43200 = 12 hours (the maximum AWS allows). Other common values: 3600 = 1 hour, 900 = 15 minutes (the minimum). This bounds how long a single aws_signing_helper credential fetch can request before it must fetch again — lower it if you want callers to re-authenticate against the CA more often.'

  IAMPolicyArns:
    Type: CommaDelimitedList
    Default: 'arn:aws:iam::aws:policy/ReadOnlyAccess'
    Description: 'Comma-separated list of IAM managed-policy ARNs to attach to the role that Roles Anywhere sessions assume — this is what client certificates are actually allowed to do in AWS once they exchange their cert for credentials. Example for broader access: "arn:aws:iam::aws:policy/PowerUserAccess". You can list multiple, comma-separated.'

Resources:
  # IAM Role for external systems
  ExternalSystemRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-ExternalSystemRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: rolesanywhere.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
              - sts:SetSourceIdentity
      ManagedPolicyArns: !Ref IAMPolicyArns
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-ExternalSystemRole'
        - Key: ManagedBy
          Value: CloudFormation

  # Trust Anchor using our own OpenSSL CA certificate (FREE - no ACM PCA)
  TrustAnchor:
    Type: AWS::RolesAnywhere::TrustAnchor
    Properties:
      Name: !Sub '${ProjectName}-TrustAnchor'
      Enabled: true
      Source:
        SourceType: CERTIFICATE_BUNDLE
        SourceData:
          X509CertificateData: !Ref CACertificateBody
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-TrustAnchor'
        - Key: ManagedBy
          Value: CloudFormation

  # Profile - binds the role to Roles Anywhere sessions
  Profile:
    Type: AWS::RolesAnywhere::Profile
    Properties:
      Name: !Sub '${ProjectName}-Profile'
      Enabled: true
      DurationSeconds: !Ref SessionDurationSeconds
      RoleArns:
        - !GetAtt ExternalSystemRole.Arn
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-Profile'
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  TrustAnchorArn:
    Description: 'Trust Anchor ARN'
    Value: !GetAtt TrustAnchor.TrustAnchorArn
    Export:
      Name: !Sub '${AWS::StackName}-TrustAnchor-ARN'

  ProfileArn:
    Description: 'Profile ARN'
    Value: !GetAtt Profile.ProfileArn
    Export:
      Name: !Sub '${AWS::StackName}-Profile-ARN'

  RoleArn:
    Description: 'IAM Role ARN'
    Value: !GetAtt ExternalSystemRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-Role-ARN'

  SetupClientCommand:
    Description: 'Run this command to set up a client certificate after deploying'
    Value: !Sub |
      ./setup-client.sh \
        --trust-anchor-arn ${TrustAnchor.TrustAnchorArn} \
        --profile-arn ${Profile.ProfileArn} \
        --role-arn ${ExternalSystemRole.Arn}
